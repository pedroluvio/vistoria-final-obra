<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#406053">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Vistoria Final de Obra</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --navy: #406053;
    --navy-mid: #334c42;
    --navy-light: #517a69;
    --steel: #517a69;
    --sky: #406053;
    --sky-light: #517a69;
    --cream: #f5f4f0;
    --warm-white: #faf9f7;
    --text-primary: #1a2332;
    --text-muted: #6b7a8d;
    --border: #dde2ea;
    --sim: #2a7a4b;
    --sim-bg: #e8f5ee;
    --nao: #c0392b;
    --nao-bg: #fdecea;
    --parcial: #d97706;
    --parcial-bg: #fef3e0;
    --na: #6b7a8d;
    --na-bg: #f0f2f5;
    --done-bg: #e8f5ee;
    --done-border: #2a7a4b;
    --shadow-sm: 0 1px 3px rgba(26,35,50,0.08);
    --shadow-md: 0 4px 12px rgba(26,35,50,0.12);
    --shadow-lg: 0 8px 24px rgba(26,35,50,0.16);
    --radius: 10px;
    --radius-lg: 16px;
  }

  html, body { height: 100%; }

  * { box-sizing: border-box; margin: 0; padding: 0; font-variant-ligatures: none; }

  body {
    font-family: 'Inter', Verdana, Geneva, sans-serif;
    background: var(--cream);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }

  /* ── SETUP SCREEN ── */
  #setup-screen {
    display: block;
    width: 100%;
    min-height: 100svh;
    padding: 24px 16px 80px 16px;
    background: linear-gradient(160deg, var(--navy) 0%, var(--navy-mid) 60%, var(--navy-light) 100%);
  }

  .setup-card {
    background: white;
    border-radius: var(--radius-lg);
    padding: 0;
    max-width: 480px;
    width: 100%;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    margin: 0 auto;
  }
  .setup-card-inner {
    padding: 28px 24px 44px;
  }
  .setup-card-header {
    background: #406053;
    padding: 18px 24px 14px;
    border-bottom: 4px solid #c8973a;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    overflow: hidden;
  }

  .setup-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }

  .setup-logo-icon {
    width: 44px;
    height: 44px;
    background: var(--navy);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .setup-logo-icon svg { width: 22px; height: 22px; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .setup-logo-text { line-height: 1.2; }
  .setup-logo-text strong { font-size: 15px; font-weight: 700; color: var(--navy); display: block; }
  .setup-logo-text span { font-size: 12px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }

  .setup-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 6px;
  }

  .setup-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 32px;
    line-height: 1.5;
  }

  .setup-section { margin-bottom: 28px; }

  .setup-section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 14px;
  }

  .setup-counter {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
  }

  .setup-counter label {
    font-size: 14px;
    font-weight: 500;
    color: var(--navy);
    min-width: 80px;
  }

  .counter-control {
    display: flex;
    align-items: center;
    gap: 0;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .counter-btn {
    width: 36px;
    height: 36px;
    background: var(--cream);
    border: none;
    cursor: pointer;
    font-size: 18px;
    font-weight: 600;
    color: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .counter-btn:active { background: var(--border); }

  .counter-value {
    width: 44px;
    text-align: center;
    font-size: 16px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: var(--navy);
    border: none;
    border-left: 1.5px solid var(--border);
    border-right: 1.5px solid var(--border);
    padding: 0;
    background: white;
    height: 36px;
    line-height: 36px;
  }

  .setup-input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 16px; /* 16px prevents iOS/Android auto-zoom on focus */
    font-family: 'Inter', sans-serif;
    color: var(--navy);
    background: white;
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 10px;
    touch-action: manipulation;
  }
  .setup-input:focus { border-color: var(--sky); }
  .setup-input::placeholder { color: var(--text-muted); }

  .setup-btn {
    width: 100%;
    padding: 16px;
    min-height: 52px;
    background: #406053;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    margin-top: 8px;
    display: block;
  }
  .setup-btn:active { background: var(--navy-light); transform: scale(0.99); }

  .setup-btn-secondary {
    flex: 1;
    padding: 11px 8px;
    background: white;
    color: var(--navy);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    display: block;
    line-height: 1.3;
  }
  .setup-btn-secondary:active { background: var(--cream); }

  /* ── MAIN APP ── */
  #app-screen { display: none; }

  .app-header {
    background: var(--navy);
    color: white;
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-md);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-logo-icon {
    width: 32px;
    height: 32px;
    background: rgba(255,255,255,0.12);
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .header-logo-icon svg { width: 16px; height: 16px; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .header-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.01em;
  }

  .header-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 1px;
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  .hdr-btn {
    padding: 7px 12px;
    border-radius: 7px;
    border: 1.5px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: white;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }
  .hdr-btn:active { background: rgba(255,255,255,0.2); }
  .hdr-btn svg { width: 13px; height: 13px; fill: none; stroke: white; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

  .hdr-btn.primary {
    background: var(--sky);
    border-color: var(--sky);
  }

  .progress-bar-wrap {
    padding: 10px 16px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .progress-track {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--sky);
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-label {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: rgba(255,255,255,0.6);
    min-width: 60px;
    text-align: right;
  }

  /* ── SECTION LIST ── */
  .sections-wrap {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-bottom: max(100px, calc(80px + env(safe-area-inset-bottom)));
    scroll-padding-bottom: 120px;
  }

  .section-block {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    border: 1.5px solid transparent;
    transition: border-color 0.2s;
  }

  .section-block.is-done {
    border-color: var(--done-border);
    background: var(--done-bg);
  }

  .section-block.is-open {
    border-color: var(--sky);
    box-shadow: var(--shadow-md);
  }

  .section-header {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    cursor: pointer;
    gap: 12px;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .section-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 16px;
  }

  .section-block.is-done .section-icon {
    background: var(--sim-bg);
  }

  .section-info { flex: 1; min-width: 0; }

  .section-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--navy);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .section-block.is-done .section-name {
    text-decoration: line-through;
    color: var(--text-muted);
  }

  .section-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 3px;
  }

  .section-progress-text {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .section-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 100px;
    background: var(--cream);
    color: var(--text-muted);
  }

  .section-block.is-done .section-badge {
    background: var(--sim-bg);
    color: var(--sim);
  }

  .section-chevron {
    width: 20px;
    height: 20px;
    color: var(--text-muted);
    transition: transform 0.25s ease;
    flex-shrink: 0;
  }
  .section-block.is-open .section-chevron { transform: rotate(180deg); }

  .section-done-tick {
    width: 22px;
    height: 22px;
    background: var(--sim);
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .section-done-tick svg { width: 12px; height: 12px; fill: none; stroke: white; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .section-block.is-done .section-done-tick { display: flex; }

  .group-na-btn {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 9px;
    border-radius: 5px;
    border: 1.5px solid var(--border);
    background: white;
    color: var(--text-muted);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
    letter-spacing: 0.03em;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .group-na-btn:active { background: var(--na-bg); border-color: var(--na); color: var(--na); }
  .group-na-btn.active {
    background: var(--na-bg);
    border-color: var(--na);
    color: var(--na);
  }

  /* ── ITEMS ── */
  .section-body {
    display: none;
    border-top: 1.5px solid var(--border);
  }
  .section-block.is-open .section-body { display: block; }

  .section-body-inner {
    padding: 12px 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .item-card {
    background: var(--warm-white);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 12px 13px;
    transition: border-color 0.15s;
  }

  .item-card.answered { border-color: transparent; }
  .item-card.answered-sim { background: var(--sim-bg); border-color: #b7e0ca; }
  .item-card.answered-nao { background: var(--nao-bg); border-color: #f5c6c2; }
  .item-card.answered-parcial { background: var(--parcial-bg); border-color: #f9d99b; }
  .item-card.answered-na { background: var(--na-bg); border-color: #d5dae2; }

  .item-question {
    font-size: 13px;
    font-weight: 500;
    color: var(--navy);
    line-height: 1.45;
    margin-bottom: 10px;
  }

  .item-options {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 6px;
    margin-bottom: 0;
  }

  .opt-btn {
    padding: 0;
    height: 34px;
    border-radius: 7px;
    border: 1.5px solid var(--border);
    background: white;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    color: var(--text-muted);
    -webkit-tap-highlight-color: transparent;
    line-height: 1;
  }

  .opt-btn.active-sim {
    background: var(--sim);
    border-color: var(--sim);
    color: white;
  }
  .opt-btn.active-nao {
    background: var(--nao);
    border-color: var(--nao);
    color: white;
  }
  .opt-btn.active-parcial {
    background: var(--parcial);
    border-color: var(--parcial);
    color: white;
  }
  .opt-btn.active-na {
    background: var(--steel);
    border-color: var(--steel);
    color: white;
  }

  .item-obs-wrap {
    margin-top: 9px;
    display: none;
  }

  .item-obs-toggle {
    font-size: 11px;
    color: var(--sky);
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    -webkit-tap-highlight-color: transparent;
  }
  .item-obs-toggle svg { width: 12px; height: 12px; fill: none; stroke: var(--sky); stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

  .item-obs-area {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    padding: 9px 11px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    color: var(--navy);
    background: white;
    resize: none;
    min-height: 68px;
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 6px;
  }
  .item-obs-area:focus { border-color: var(--sky); }

  .photo-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .photo-thumb {
    width: 60px;
    height: 60px;
    border-radius: 6px;
    object-fit: cover;
    border: 1.5px solid var(--border);
    cursor: pointer;
  }

  .photo-add-btn {
    width: 60px;
    height: 60px;
    border-radius: 6px;
    border: 1.5px dashed var(--border);
    background: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    gap: 2px;
    -webkit-tap-highlight-color: transparent;
    color: var(--text-muted);
    font-size: 10px;
    font-weight: 500;
    transition: border-color 0.15s;
  }
  .photo-add-btn:active { border-color: var(--sky); }
  .photo-add-btn svg { width: 18px; height: 18px; fill: none; stroke: var(--text-muted); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* ── CABEÇALHO CARD ── */
  .cabecalho-card {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    border: 1.5px solid transparent;
    margin-bottom: 8px;
  }

  .cabecalho-header {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    cursor: pointer;
    gap: 12px;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .cabecalho-body {
    display: none;
    border-top: 1.5px solid var(--border);
    padding: 14px 16px;
  }

  .cabecalho-body.is-open { display: block; }

  .field-row {
    margin-bottom: 12px;
  }

  .field-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-muted);
    margin-bottom: 5px;
  }

  .field-input {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    font-size: 16px; /* 16px prevents auto-zoom on Android/iOS */
    font-family: 'Inter', sans-serif;
    color: var(--navy);
    background: var(--warm-white);
    outline: none;
    transition: border-color 0.15s;
    touch-action: manipulation;
  }
  .field-input:focus { border-color: var(--sky); background: white; }

  .field-row-2col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }

  /* ── MODAL FOTO ── */
  #photo-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  #photo-modal.open { display: flex; }

  #photo-modal img {
    max-width: 94vw;
    max-height: 80vh;
    border-radius: 10px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  }

  .modal-close {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .modal-close svg { width: 18px; height: 18px; fill: none; stroke: white; stroke-width: 2.5; stroke-linecap: round; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--navy);
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
    max-width: calc(100vw - 32px);
    text-align: center;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── SUMMARY ── */
  .summary-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    border-top: 1.5px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 -4px 16px rgba(26,35,50,0.1);
    z-index: 50;
  }

  .summary-chips {
    display: flex;
    gap: 6px;
    flex: 1;
    overflow: hidden;
  }

  .summary-chip {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 8px;
    border-radius: 6px;
    white-space: nowrap;
  }
  .chip-sim { background: var(--sim-bg); color: var(--sim); }
  .chip-nao { background: var(--nao-bg); color: var(--nao); }
  .chip-parcial { background: var(--parcial-bg); color: var(--parcial); }
  .chip-na { background: var(--na-bg); color: var(--na); }

  .export-fab {
    padding: 10px 18px;
    background: var(--navy);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .export-fab:active { background: var(--navy-light); }
  .export-fab svg { width: 14px; height: 14px; fill: none; stroke: white; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

  /* ── hidden file inputs ── */
  #file-input-gallery, #file-input-camera { display: none; }

  @media print {
    body { background: white; }
    .app-header, .summary-bar, #toast { display: none !important; }
    .section-body { display: block !important; }
    .section-block { break-inside: avoid; }
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      color-adjust: exact !important;

// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
let state = {
  sections: [],        // built from template + config
  answers: {},         // itemId -> 'sim'|'nao'|'parcial'|'na'|null
  obs: {},             // itemId -> string
  photos: {},          // itemId -> [dataURL, ...]
  header: {},
};

let counts = { quartos: 1, is: 1 };
let currentPhotoItemId = null;

// ── Persistent storage: localStorage preferred, sessionStorage fallback (Drive/cloud) ──
const SAVE_KEY = 'vistoria_state_v1';

function _storage() {
  try { localStorage.setItem('_t','1'); localStorage.removeItem('_t'); return localStorage; }
  catch(e) { return sessionStorage; }
}

function saveState() {
  try {
    const payload = JSON.stringify({
      state: { answers: state.answers, obs: state.obs, header: state.header, photos: state.photos },
      counts: counts,
      ts: Date.now()
    });
    _storage().setItem(SAVE_KEY, payload);
  } catch(e) { /* quota exceeded or private mode — silent fail */ }
}

function loadState() {
  try {
    const raw = _storage().getItem(SAVE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

function clearSavedState() {
  try { _storage().removeItem(SAVE_KEY); } catch(e) {}
}

function exportSession() {
  const payload = JSON.stringify({
    state: { answers: state.answers, obs: state.obs, header: state.header, photos: state.photos },
    counts: counts,
    ts: Date.now()
  }, null, 2);
  const blob = new Blob([payload], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const codigo = state.header.codigo || 'vistoria';
  a.href = url;
  a.download = 'sessao_' + codigo + '_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Sessão guardada como ficheiro JSON.');
}

function importSession(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.state || !data.counts) throw new Error('Formato inválido');
      applyRestoredState(data);
      showToast('Sessão retomada com sucesso!');
    } catch(err) {
      alert('Erro ao importar sessão: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function applyRestoredState(data) {
  counts = data.counts;
  document.getElementById('val-quartos').textContent = counts.quartos;
  document.getElementById('val-is').textContent = counts.is;
  // Restore header fields
  const h = data.state.header || {};
  ['codigo','morada','empreiteiro','rep','data','tecnico'].forEach(function(k) {
    const el = document.getElementById('inp-' + k);
    if (el && h[k]) el.value = h[k];
  });
  // Store restored data to be picked up by startApp
  window._restoredStateData = data;
  showToast('Dados restaurados. Clique "Iniciar Vistoria" para continuar.');
}

// ════════════════════════════════════════
//  SETUP
// ════════════════════════════════════════
function adjustCount(key, delta) {
  const min = key === 'quartos' ? 0 : 0;
  const max = key === 'quartos' ? 6 : 4;
  counts[key] = Math.max(min, Math.min(max, counts[key] + delta));
  document.getElementById(`val-${key}`).textContent = counts[key];
}

function buildSections() {
  const sections = [...TEMPLATE_SECTIONS];
  // Insert quartos after SALA
  for (let i = 1; i <= counts.quartos; i++) {
    sections.push(makeQuarto(i));
  }
  // Then IS
  for (let i = 1; i <= counts.is; i++) {
    sections.push(makeIS(i));
  }
  sections.push(DIVERSOS);
  return sections;
}

function startApp() {
  try {
  state.header = {
    codigo: document.getElementById('inp-codigo').value,
    morada: document.getElementById('inp-morada').value,
    empreiteiro: document.getElementById('inp-empreiteiro').value,
    rep: document.getElementById('inp-rep').value,
    data: document.getElementById('inp-data').value,
    tecnico: document.getElementById('inp-tecnico').value,
  };

  state.sections = buildSections();

  // Pre-build answers map
  state.answers = {};
  state.obs = {};
  state.photos = {};
  for (const sec of state.sections) {
    for (const grp of sec.items) {
      for (let i = 0; i < grp.items.length; i++) {
        const id = `${grp.id}_${i}`;
        state.answers[id] = null;
        state.obs[id] = '';
        state.photos[id] = [];
      }
    }
  }

  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('header-morada').textContent = (state.header.codigo ? state.header.codigo + ' · ' : '') + (state.header.morada || '—');

  renderSections();

  // Restore saved answers/obs/photos if available
  const restored = window._restoredStateData || loadState();
  if (restored && restored.state) {
    const rs = restored.state;
    // Only restore if header matches (same imóvel)
    if (rs.answers) {
      for (const [id, val] of Object.entries(rs.answers)) {
        if (id in state.answers && val) {
          state.answers[id] = val;
          // Update UI
          const card = document.getElementById('ic-' + id);
          if (card) card.className = 'item-card answered answered-' + val;
          ['sim','nao','parcial','na'].forEach(function(v) {
            const btn = document.getElementById('opt-' + id + '-' + v);
            if (btn) btn.className = 'opt-btn' + (val === v ? ' active-' + v : '');
          });
        }
      }
    }
    if (rs.obs) {
      for (const [id, val] of Object.entries(rs.obs)) {
        if (id in state.obs && val) {
          state.obs[id] = val;
          const ta = document.getElementById('obs-' + id);
          if (ta) ta.value = val;
        }
      }
    }
    if (rs.photos) {
      for (const [id, photos] of Object.entries(rs.photos)) {
        if (id in state.photos && photos && photos.length) {
          state.photos[id] = photos;
          renderPhotoRow(id);
          // Show obs panel if photos exist
          const wrap = document.getElementById('obs-wrap-' + id);
          if (wrap) wrap.style.display = 'block';
        }
      }
    }
    // Update all section statuses
    for (const sec of state.sections) updateSectionStatus(sec.id);
    if (restored.state.answers && Object.values(restored.state.answers).some(Boolean)) {
      showToast('Sessão anterior restaurada automaticamente.');
    }
  }
  window._restoredStateData = null;

  updateProgress();
  } catch(err) {
    alert('Erro ao iniciar: ' + err.message);
  }
}

// ════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════
function renderSections() {
  const wrap = document.getElementById('sections-wrap');

  // Cabeçalho card
  const cab = document.createElement('div');
  cab.className = 'cabecalho-card';
  cab.innerHTML = `
    <div class="cabecalho-header" onclick="toggleCabecalho()">
      <div class="section-icon">📋</div>
      <div class="section-info">
        <div class="section-name">Cabeçalho</div>
        <div class="section-meta"><span class="section-progress-text">Dados da vistoria</span></div>
      </div>
      <svg class="section-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="cab-chev"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="cabecalho-body" id="cabecalho-body">
      <div class="field-row">
        <div class="field-label">Código do Imóvel</div>
        <input class="field-input" id="f-codigo" value="${state.header.codigo || ''}" placeholder="Código do imóvel (ex: LV000)">
      </div>
      <div class="field-row">
        <div class="field-label">Morada</div>
        <input class="field-input" id="f-morada" value="${state.header.morada || ''}" placeholder="Morada do imóvel">
      </div>
      <div class="field-row">
        <div class="field-label">Empreiteiro</div>
        <input class="field-input" id="f-empreiteiro" value="${state.header.empreiteiro || ''}" placeholder="Empreiteiro">
      </div>
      <div class="field-row">
        <div class="field-label">Representante legal do empreiteiro</div>
        <input class="field-input" id="f-rep" value="${state.header.rep || ''}" placeholder="Representante legal">
      </div>
      <div class="field-row-2col">
        <div>
          <div class="field-label">Data</div>
          <input class="field-input" id="f-data" type="date" value="${state.header.data || ''}">
        </div>
        <div>
          <div class="field-label">Técnico</div>
          <input class="field-input" id="f-tecnico" value="${state.header.tecnico || 'Pedro Gonçalves'}">
        </div>
      </div>
    </div>
  `;
  wrap.appendChild(cab);

  // Section blocks
  for (const sec of state.sections) {
    const block = document.createElement('div');
    block.className = 'section-block';
    block.id = `sec-${sec.id}`;

    // Count items
    let total = 0;
    for (const grp of sec.items) total += grp.items.length;

    block.innerHTML = `
      <div class="section-header" onclick="toggleSection('${sec.id}')">
        <div class="section-icon">${sec.icon}</div>
        <div class="section-info">
          <div class="section-name">${sec.name}</div>
          <div class="section-meta">
            <span class="section-progress-text" id="sp-${sec.id}">0 / ${total}</span>
            <span class="section-badge" id="sb-${sec.id}">por verificar</span>
          </div>
        </div>
        <div class="section-done-tick"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
        <svg class="section-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="section-body">
        <div class="section-body-inner" id="sb-body-${sec.id}">
          ${renderSectionBody(sec)}
        </div>
      </div>
    `;
    wrap.appendChild(block);
  }
}

function renderSectionBody(sec) {
  let html = '';
  for (const grp of sec.items) {
    html += `
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:2px;padding:6px 0 2px;border-bottom:1px solid var(--border)">
        <span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-muted)">${grp.group}</span>
        <button class="group-na-btn" id="grp-na-${grp.id}" onclick="setGroupNA('${grp.id}',${grp.items.length})">N/A grupo</button>
      </div>`;
    for (let i = 0; i < grp.items.length; i++) {
      const id = `${grp.id}_${i}`;
      html += `
        <div class="item-card" id="ic-${id}">
          <div class="item-question">${grp.items[i]}</div>
          <div class="item-options">
            <button class="opt-btn" id="opt-${id}-sim" onclick="setAnswer('${id}','sim')">Sim</button>
            <button class="opt-btn" id="opt-${id}-nao" onclick="setAnswer('${id}','nao')">Não</button>
            <button class="opt-btn" id="opt-${id}-parcial" onclick="setAnswer('${id}','parcial')">Parcial</button>
            <button class="opt-btn" id="opt-${id}-na" onclick="setAnswer('${id}','na')">N/A</button>
          </div>
          <div class="item-obs-toggle" onclick="toggleObs('${id}')">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span id="obs-toggle-label-${id}">Adicionar nota ou foto</span>
          </div>
          <div class="item-obs-wrap" id="obs-wrap-${id}">
            <textarea class="item-obs-area" id="obs-${id}" placeholder="Observações..." oninput="saveObs('${id}',this.value)">${state.obs[id] || ''}</textarea>
            <div class="photo-row" id="photo-row-${id}">
              <div class="photo-add-btn" onclick="addPhoto('${id}')">
                <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                Foto
              </div>
            </div>
          </div>
        </div>`;
    }
  }
  return html;
}

function setGroupNA(grpId, count) {
  // Check if ALL items in group are already N/A → toggle off
  const allNA = Array.from({length: count}, (_,i) => state.answers[`${grpId}_${i}`] === 'na').every(Boolean);
  const newVal = allNA ? null : 'na';

  for (let i = 0; i < count; i++) {
    const id = `${grpId}_${i}`;
    state.answers[id] = newVal;
    const card = document.getElementById(`ic-${id}`);
    if (card) card.className = 'item-card' + (newVal ? ` answered answered-${newVal}` : '');
    ['sim','nao','parcial','na'].forEach(v => {
      const btn = document.getElementById(`opt-${id}-${v}`);
      if (btn) btn.className = 'opt-btn' + (newVal === v ? ` active-${v}` : '');
    });
  }

  // Update the group button state
  const grpBtn = document.getElementById(`grp-na-${grpId}`);
  if (grpBtn) grpBtn.classList.toggle('active', !allNA);

  // Find section and update
  let secId = null;
  for (const sec of state.sections) {
    if (sec.items.some(g => g.id === grpId)) { secId = sec.id; break; }
  }
  updateSectionStatus(secId);
  updateProgress();
}

function toggleCabecalho() {
  const body = document.getElementById('cabecalho-body');
  const chev = document.getElementById('cab-chev');
  const open = body.classList.toggle('is-open');
  chev.style.transform = open ? 'rotate(180deg)' : '';
}

function toggleSection(id) {
  const block = document.getElementById(`sec-${id}`);
  const wasOpen = block.classList.contains('is-open');
  // Close all
  document.querySelectorAll('.section-block.is-open').forEach(b => b.classList.remove('is-open'));
  if (!wasOpen) block.classList.add('is-open');
}

// ════════════════════════════════════════
//  ANSWERS
// ════════════════════════════════════════
function setAnswer(id, val) {
  const prev = state.answers[id];
  state.answers[id] = (prev === val) ? null : val; // toggle off if same

  // UI update
  const card = document.getElementById(`ic-${id}`);
  card.className = 'item-card' + (state.answers[id] ? ` answered answered-${state.answers[id]}` : '');

  ['sim','nao','parcial','na'].forEach(v => {
    const btn = document.getElementById(`opt-${id}-${v}`);
    btn.className = 'opt-btn' + (state.answers[id] === v ? ` active-${v}` : '');
  });

  updateSectionStatus(getSectionIdFromItemId(id));
  updateProgress();
  saveState();
}

function saveObs(id, val) {
  state.obs[id] = val;
  saveState();
}

function toggleObs(id) {
  const wrap = document.getElementById(`obs-wrap-${id}`);
  const label = document.getElementById(`obs-toggle-label-${id}`);
  const open = wrap.style.display === 'block';
  wrap.style.display = open ? 'none' : 'block';
  label.textContent = open ? 'Adicionar nota ou foto' : 'Fechar notas';
}

function getSectionIdFromItemId(itemId) {
  // itemId is like "g0_0" or "Q1_2"
  // We find which section owns it
  for (const sec of state.sections) {
    for (const grp of sec.items) {
      for (let i = 0; i < grp.items.length; i++) {
        if (`${grp.id}_${i}` === itemId) return sec.id;
      }
    }
  }
  return null;
}

function updateSectionStatus(secId) {
  if (!secId) return;
  const sec = state.sections.find(s => s.id === secId);
  if (!sec) return;

  let total = 0, answered = 0;
  for (const grp of sec.items) {
    for (let i = 0; i < grp.items.length; i++) {
      total++;
      if (state.answers[`${grp.id}_${i}`]) answered++;
    }
  }

  const block = document.getElementById(`sec-${secId}`);
  const spEl = document.getElementById(`sp-${secId}`);
  const sbEl = document.getElementById(`sb-${secId}`);

  spEl.textContent = `${answered} / ${total}`;

  const done = answered === total;
  block.classList.toggle('is-done', done);
  sbEl.textContent = done ? 'Completo ✓' : answered > 0 ? `${total - answered} por preencher` : 'por verificar';
}

function updateProgress() {
  let total = 0, answered = 0;
  let counts_ans = { sim: 0, nao: 0, parcial: 0, na: 0 };

  for (const [id, val] of Object.entries(state.answers)) {
    total++;
    if (val) {
      answered++;
      counts_ans[val]++;
    }
  }

  const pct = total > 0 ? (answered / total) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${answered} / ${total}`;
  document.getElementById('sum-sim').textContent = `✓ ${counts_ans.sim}`;
  document.getElementById('sum-nao').textContent = `✗ ${counts_ans.nao}`;
  document.getElementById('sum-parcial').textContent = `◑ ${counts_ans.parcial}`;
  document.getElementById('sum-na').textContent = `— ${counts_ans.na}`;
}

// ════════════════════════════════════════
//  PHOTOS
// ════════════════════════════════════════
function addPhoto(itemId) {
  currentPhotoItemId = itemId;
  const modal = document.getElementById('photo-source-modal');
  modal.style.display = 'flex';
}

(function() {
  function closePhotoModal() {
    document.getElementById('photo-source-modal').style.display = 'none';
  }

  function bindPhotoInput(inputId, isCamera) {
    const fi = document.getElementById(inputId);
    fi.onchange = function(e) {
      handlePhotos(e);
      closePhotoModal();
    };
    return fi;
  }

  document.getElementById('psm-camera').onclick = function() {
    const fi = bindPhotoInput('file-input-camera', true);
    fi.value = '';
    fi.click();
  };

  document.getElementById('psm-gallery').onclick = function() {
    const fi = bindPhotoInput('file-input-gallery', false);
    fi.value = '';
    fi.click();
  };

  document.getElementById('psm-cancel').onclick = closePhotoModal;

  // Close on backdrop tap
  document.getElementById('photo-source-modal').onclick = function(e) {
    if (e.target === this) closePhotoModal();
  };
})();

function handlePhotos(e) {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  const id = currentPhotoItemId;

  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      state.photos[id] = state.photos[id] || [];
      state.photos[id].push(ev.target.result);
      renderPhotoRow(id);
    };
    reader.readAsDataURL(file);
  });

  e.target.value = '';
  saveState();
  // Open obs if not already
  const wrap = document.getElementById(`obs-wrap-${id}`);
  if (wrap.style.display !== 'block') toggleObs(id);
}

function renderPhotoRow(id) {
  const row = document.getElementById(`photo-row-${id}`);
  row.innerHTML = '';
  (state.photos[id] || []).forEach((src, idx) => {
    const img = document.createElement('img');
    img.className = 'photo-thumb';
    img.src = src;
    img.onclick = () => openPhoto(src);
    row.appendChild(img);
  });
  // Add button
  const btn = document.createElement('div');
  btn.className = 'photo-add-btn';
  btn.onclick = () => addPhoto(id);
  btn.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg><span style="font-size:10px;font-weight:500;color:var(--text-muted)">Foto</span>`;
  row.appendChild(btn);
}

function openPhoto(src) {
  document.getElementById('photo-modal-img').src = src;
  document.getElementById('photo-modal').classList.add('open');
}
function closePhoto() {
  document.getElementById('photo-modal').classList.remove('open');
}

// ════════════════════════════════════════
//  EXPORT PDF
// ════════════════════════════════════════
function exportPDF() {
  showToast("A gerar PDF, aguarde…");
  // Sync header values from form
  state.header.codigo    = document.getElementById('f-codigo')?.value || state.header.codigo;
  state.header.morada    = document.getElementById('f-morada')?.value || state.header.morada;
  state.header.empreiteiro = document.getElementById('f-empreiteiro')?.value || state.header.empreiteiro;
  state.header.rep       = document.getElementById('f-rep')?.value || state.header.rep;
  state.header.data      = document.getElementById('f-data')?.value || state.header.data;
  state.header.tecnico   = document.getElementById('f-tecnico')?.value || state.header.tecnico;

  const formatDate = (d) => {
    if (!d) return '—';
    const [y,m,day] = d.split('-');
    return `${day}/${m}/${y}`;
  };

  const optLabel = { sim: 'Sim', nao: 'Não', parcial: 'Parcial', na: 'N/A' };
  const optColor = { sim: '#2a7a4b', nao: '#c0392b', parcial: '#d97706', na: '#6b7a8d' };
  const optBg    = { sim: '#e8f5ee', nao: '#fdecea', parcial: '#fef3e0', na: '#f0f2f5' };

  let totalItems = 0, totalAnswered = 0;
  let counts_ans = { sim: 0, nao: 0, parcial: 0, na: 0 };
  for (const [id, val] of Object.entries(state.answers)) {
    totalItems++;
    if (val) { totalAnswered++; counts_ans[val]++; }
  }

  let sectionsHTML = '';
  for (const sec of state.sections) {
    let secTotal = 0, secAnswered = 0;
    for (const grp of sec.items) {
      for (let i = 0; i < grp.items.length; i++) {
        secTotal++;
        if (state.answers[`${grp.id}_${i}`]) secAnswered++;
      }
    }
    const secDone = secTotal === secAnswered;

    let groupsHTML = '';
    for (const grp of sec.items) {
      let itemsHTML = '';
      for (let i = 0; i < grp.items.length; i++) {
        const id = `${grp.id}_${i}`;
        const val = state.answers[id];
        const obs = state.obs[id];
        const photos = state.photos[id] || [];

        const badge = val
          ? `<span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;background:${optBg[val]};color:${optColor[val]}">${optLabel[val]}</span>`
          : `<span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:#f0f2f5;color:#9aa5b4">Por verificar</span>`;

        const obsBlock = obs ? `<div style="margin-top:4px;font-size:11px;color:#555;background:#f8f9fb;border-left:3px solid #dde2ea;padding:4px 8px;border-radius:0 4px 4px 0">${obs}</div>` : '';

        let photosBlock = '';
        if (photos.length) {
          photosBlock = `<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px">`;
          photos.forEach(src => {
            // Render at natural aspect ratio, capped at 300px on shorter side
            photosBlock += `<img src="${src}" style="max-width:300px;max-height:300px;width:auto;height:auto;object-fit:contain;border-radius:6px;border:1px solid #dde2ea;display:block">`;
          });
          photosBlock += `</div>`;
        }

        itemsHTML += `
          <tr>
            <td style="padding:7px 10px;font-size:12px;color:#406053;border-bottom:1px solid #edf0f4;vertical-align:top;font-family:Helvetica,Arial,sans-serif;font-variant-ligatures:none">
              ${grp.items[i]}
              ${obsBlock}
              ${photosBlock}
            </td>
            <td style="padding:7px 10px;border-bottom:1px solid #edf0f4;vertical-align:top;text-align:right;white-space:nowrap;font-family:Helvetica,Arial,sans-serif">${badge}</td>
          </tr>`;
      }

      groupsHTML += `
        <div style="margin-bottom:12px">
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#6b7a8d;padding:5px 0 3px;border-bottom:1px solid #edf0f4;margin-bottom:4px">${grp.group}</div>
          <table style="width:100%;border-collapse:collapse;table-layout:fixed"><colgroup><col style="width:75%"><col style="width:25%"></colgroup>${itemsHTML}</table>
        </div>`;
    }

    const doneTag = secDone
      ? `<span style="background:#e8f5ee;color:#2a7a4b;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;margin-left:8px">✓ COMPLETO</span>`
      : `<span style="background:#f0f2f5;color:#6b7a8d;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;margin-left:8px">${secAnswered}/${secTotal}</span>`;

    sectionsHTML += `
      <div style="margin-bottom:20px;page-break-before:always;page-break-inside:auto">
        <div style="background:#406053;color:white;padding:9px 14px;border-radius:7px 7px 0 0;display:flex;align-items:center;justify-content:space-between;-webkit-print-color-adjust:exact;print-color-adjust:exact">
          <span style="font-size:13px;font-weight:700">${sec.icon} ${sec.name}</span>
          ${doneTag}
        </div>
        <div style="background:white;border:1px solid #dde2ea;border-top:none;border-radius:0 0 7px 7px;padding:12px 14px;-webkit-print-color-adjust:exact;print-color-adjust:exact;outline:1px solid #dde2ea;outline-offset:-1px">
          ${groupsHTML}
        </div>
      </div>`;
  }

  const pct = totalItems > 0 ? Math.round((totalAnswered / totalItems) * 100) : 0;

  const html = `<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=794, initial-scale=1.0, shrink-to-fit=no">
<title>Vistoria Final de Obra</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-synthesis: none; font-variant-ligatures: none; }
  body { font-family: Verdana, Geneva, sans-serif; font-size: 11px; color: #1a2332; background: white; padding: 20px; width: 794px; max-width: 794px; }
  @media print {
    body { padding: 0; width: auto; max-width: none; }
    .no-print { display: none !important; }
    html, body, * { -webkit-print-color-adjust: exact; print-color-adjust: exact; font-synthesis: none; }
  }
  @page {
    size: A4;
    margin: 14mm 12mm 12mm 12mm;
    @top-left { content: "Vistoria Final de Obra"; font-family: Verdana, Geneva, sans-serif; font-size: 9px; font-weight: 600; color: #444; }
    @top-right { content: var(--print-ref); font-family: Verdana, Geneva, sans-serif; font-size: 9px; color: #555; }
    @bottom-left { content: var(--print-ref); font-family: Verdana, Geneva, sans-serif; font-size: 9px; color: #888; }
    @bottom-right { content: counter(page) " / " counter(pages); font-family: Verdana, Geneva, sans-serif; font-size: 9px; color: #888; }
  }
</style>
</head>

      `<style>:root{--print-ref:"${printRef.replace(/"/g,"'")}"}<\/style></head>`)
    .replace('<div class="no-print"', '<div class="no-print" style="display:none"');

  // ── Print: blob URL with inline auto-print script ──
  // The script runs inside the opened document's own context —
  // this works on Android Chrome (file://), desktop, and Drive.
  const autoScript = '<scr' + 'ipt>window.addEventListener(\'load\',function(){' +
    'document.title=' + JSON.stringify(printTitle) + ';' +
    'setTimeout(function(){window.print();},500);' +
    '});</scr' + 'ipt>';

  const printHtmlFinal = printHtml.replace('</head>', autoScript + '</head>');
  const blob = new Blob([printHtmlFinal], { type: 'text/html;charset=utf-8' });
  const blobUrl = URL.createObjectURL(blob);
  const newWin = window.open(blobUrl, '_blank');

  if (!newWin) {
    fallbackDownload(html, filename);
  } else {
    setTimeout(function() { URL.revokeObjectURL(blobUrl); }, 60000);
  }
}

function fallbackDownload(html, filename) {
  // Last resort: download HTML file — user opens it and uses Share → Print
  try {
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename + '.html';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 5000);
    showToast('Ficheiro HTML guardado — abre-o e usa Partilhar → Imprimir.');
  } catch(e2) {
    showToast('Não foi possível gerar o PDF. Tenta noutro browser.');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

// ── Keyboard scroll: compatible with Xiaomi MIUI + Chrome file:// ──
(function() {
  function nudge(el) {
    if (!el || (el.tagName !== 'INPUT' && el.tagName !== 'TEXTAREA')) return;
    var rect = el.getBoundingClientRect();
    var vvHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    var mid = vvHeight / 2;
    var elMid = rect.top + rect.height / 2;
    if (elMid > mid) {
      // Element is below centre of visible area — scroll it into view manually
      var scrollAmt = elMid - mid + 20;
      window.scrollBy({ top: scrollAmt, behavior: 'smooth' });
    }
  }

  document.addEventListener('focusin', function(e) {
    var el = e.target;
    setTimeout(function() { nudge(el); }, 350);
    setTimeout(function() { nudge(el); }, 750);
  });

  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', function() {
      setTimeout(function() { nudge(document.activeElement); }, 100);
    });
  } else {
    // Fallback for older MIUI WebViews without visualViewport
    window.addEventListener('resize', function() {
      setTimeout(function() { nudge(document.activeElement); }, 150);
    });
  }
})();

// ── Iniciar Vistoria: onclick only — touchend+preventDefault breaks Xiaomi/MIUI Chrome ──
// No custom touch handlers. Pure onclick is the most compatible approach for file:// on Android.


document.getElementById('photo-modal').addEventListener('click', function(e) {
  if (e.target === this) closePhoto();
});

// ── Auto-restore setup screen from saved state on page load ──
(function() {
  var saved = loadState();
  if (!saved || !saved.state || !saved.state.header) return;
  var h = saved.state.header;
  var hasData = h.codigo || h.morada || h.empreiteiro;
  if (!hasData) return;

  // Restore counts
  if (saved.counts) {
    counts = saved.counts;
    document.getElementById('val-quartos').textContent = counts.quartos;
    document.getElementById('val-is').textContent = counts.is;
  }

  // Restore header fields
  ['codigo','morada','empreiteiro','rep','data','tecnico'].forEach(function(k) {
    var el = document.getElementById('inp-' + k);
    if (el && h[k]) el.value = h[k];
  });

  // Store for startApp to pick up
  window._restoredStateData = saved;

  // Show indicator
  var ind = document.getElementById('autosave-indicator');
  if (ind) {
    var d = new Date(saved.ts);
    var dateStr = d.toLocaleDateString('pt-PT') + ' ' + d.toLocaleTimeString('pt-PT', {hour:'2-digit',minute:'2-digit'});
    ind.textContent = '💾 Sessão guardada automaticamente em ' + dateStr;
    ind.style.display = 'block';
  }
})();

// ── PWA Service Worker ──
if ('serviceWorker' in navigator) {
  const sw = `
    const CACHE='vistoria-v1';
    self.addEventListener('install',e=>{self.skipWaiting()});
    self.addEventListener('fetch',e=>{
      e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>new Response('offline'))));
    });
  `;
  const blob = new Blob([sw], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
