<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#406053">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Vistoria Final de Obra — Luvio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="setup-screen">
  <div class="setup-card">
    <div class="setup-card-header">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="display:flex;align-items:center;">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </div>
        <div>
          <div style="font-size:14px;font-weight:700;color:white;line-height:1.2">Vistoria Final de Obra</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.6);font-family:monospace;margin-top:2px">v3.0 · Luvio Cloud</div>
        </div>
      </div>
    </div>
    <div class="setup-card-inner">
      <div class="setup-title">Configuração da Vistoria</div>
      <div class="setup-sub">Defina a tipologia do apartamento para ajustar automaticamente os separadores.</div>

      <div class="setup-section">
        <div class="setup-section-label">Tipologia</div>
        <div class="setup-counter">
          <label>Quartos</label>
          <div class="counter-control">
            <button class="counter-btn" onclick="adjustCount('quartos',-1)">−</button>
            <div class="counter-value" id="val-quartos">1</div>
            <button class="counter-btn" onclick="adjustCount('quartos',1)">+</button>
          </div>
        </div>
        <div class="setup-counter">
          <label>Inst. Sanitárias</label>
          <div class="counter-control">
            <button class="counter-btn" onclick="adjustCount('is',-1)">−</button>
            <div class="counter-value" id="val-is">1</div>
            <button class="counter-btn" onclick="adjustCount('is',1)">+</button>
          </div>
        </div>
      </div>

      <div class="setup-section">
        <div class="setup-section-label">Dados da Vistoria</div>
        <input class="setup-input" id="inp-codigo" placeholder="Código do imóvel (ex: LV001)" type="text">
        <input class="setup-input" id="inp-morada" placeholder="Morada do imóvel" type="text">
        <input class="setup-input" id="inp-empreiteiro" placeholder="Empreiteiro" type="text">
        <input class="setup-input" id="inp-rep" placeholder="Representante legal do empreiteiro" type="text">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <input class="setup-input" id="inp-data" type="date" style="margin-bottom:0">
          <input class="setup-input" id="inp-tecnico" placeholder="Técnico" type="text" value="Pedro Gonçalves" style="margin-bottom:0">
        </div>
      </div>

      <button class="setup-btn" onclick="startAppWithGoogleDrive()">Iniciar Vistoria com Google Drive →</button>

      <div style="display:flex;gap:10px;margin-top:10px">
        <button class="setup-btn-secondary" onclick="exportSessionLocal()" title="Guarda um backup local imediato">
          💾 Backup Local
        </button>
        <button class="setup-btn-secondary" onclick="document.getElementById('file-import-local').click()" title="Retoma uma sessão a partir de um ficheiro do computador">
          📂 Carregar JSON Local
        </button>
        <input type="file" id="file-import-local" accept=".json" style="display:none" onchange="importSessionLocal(this.files[0])">
      </div>
      
      <div id="autosave-indicator" style="text-align:center;font-size:11px;color:var(--text-muted);margin-top:12px;display:none">
        💾 Sessão ativa detetada
      </div>
    </div>
  </div>
</div>

<div id="app-screen">
  <header class="app-header">
    <div class="header-top">
      <div class="header-logo">
        <div class="header-logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </div>
        <div>
          <div class="header-title">Luvio Vistorias</div>
          <div class="header-sub" id="header-morada">—</div>
        </div>
      </div>
      <div class="header-actions">
        <div id="sync-status-badge" style="font-size:10px; color:#e8f5ee; background:rgba(255,255,255,0.15); padding:4px 8px; border-radius:4px; display:flex; align-items:center; gap:4px">
          <span style="width:6px; height:6px; background:#2a7a4b; border-radius:50%; display:inline-block"></span> Ligado ao Drive
        </div>
        <button class="hdr-btn" onclick="triggerManualDriveSave()">
          Guardar no Drive
        </button>
        <button class="hdr-btn primary" onclick="exportPDF()">
          Gerar PDF
        </button>
      </div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label">0 / 0</div>
    </div>
  </header>

  <div class="sections-wrap" id="sections-wrap">
    </div>

  <div class="summary-bar">
    <div class="summary-chips">
      <div class="summary-chip chip-sim" id="sum-sim">✓ 0</div>
      <div class="summary-chip chip-nao" id="sum-nao">✗ 0</div>
      <div class="summary-chip chip-parcial" id="sum-parcial">◑ 0</div>
      <div class="summary-chip chip-na" id="sum-na">— 0</div>
    </div>
    <button class="export-fab" onclick="exportPDF()">
      Exportar Relatório PDF
    </button>
  </div>
</div>

<div id="photo-modal">
  <button class="modal-close" onclick="closePhoto()">✕</button>
  <img id="photo-modal-img" src="" alt="">
</div>

<div id="toast"></div>
<input type="file" id="file-input-gallery" accept="image/*" multiple style="display:none">
<input type="file" id="file-input-camera" accept="image/*" capture="environment" style="display:none">

<div id="photo-source-modal" style="display:none;" class="source-modal-backdrop">
  <div class="source-modal-card">
    <div style="font-size:14px;font-weight:700;color:#1a2332;margin-bottom:16px;text-align:center">Adicionar Fotografia</div>
    <button id="psm-camera" class="psm-btn primary-btn">Tirar Fotografia</button>
    <button id="psm-gallery" class="psm-btn secondary-btn">Escolher da Galeria</button>
    <button id="psm-cancel" class="psm-btn cancel-btn">Cancelar</button>
  </div>
</div>

<iframe id="print-frame" style="display:none;"></iframe>

<script src="drive-service.js"></script>
<script src="app.js"></script>

<script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
